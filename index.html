<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>일본어 단어 암기 (히라가나 모드)</title>
    <style>
        html, body { 
            font-family: 'Malgun Gothic', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            background-color: #f0f2f5;
            touch-action: manipulation; 
            user-select: none;
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            text-align: center; 
            width: 95%; 
            max-width: 600px; 
            box-sizing: border-box; 
        }
        .unit-selector { margin-bottom: 30px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .unit-btn { padding: 12px 20px; font-size: 1em; cursor: pointer; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
        .unit-btn.active { background: #34495e; color: white; border-color: #34495e; font-weight: bold; }
        
        .korean { font-size: 3.5em; font-weight: bold; margin: 40px 0; color: #2c3e50; min-height: 1.2em; word-break: keep-all; }
        .japanese { font-size: 4em; color: #e74c3c; min-height: 1.5em; margin-bottom: 40px; border-bottom: 3px solid #eee; padding-bottom: 15px; font-weight: bold; letter-spacing: 2px; }
        
        .btn-main { 
            padding: 20px; font-size: 1.6em; cursor: pointer; border: none; border-radius: 15px; 
            background-color: #3498db; color: white; width: 100%; 
            touch-action: manipulation; font-weight: bold;
        }
        .hidden { visibility: hidden; }
        .unit-info { color:#888; font-size: 1.1em; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="unit-selector">
        <button class="unit-btn active" onclick="selectUnit(0)">사진 1</button>
        <button class="unit-btn" onclick="selectUnit(1)">사진 2</button>
        <button class="unit-btn" onclick="selectUnit(2)">사진 3</button>
    </div>

    <div id="unit-title" class="unit-info">단어장 1구역</div>
    <div id="progress" style="font-size: 1.2em; color: #3498db; margin-bottom: 20px; font-weight: bold;">1 / 50</div>
    
    <div id="korean-text" class="korean">로딩 중...</div>
    <div id="japanese-text" class="japanese hidden">정답</div>
    
    <button id="main-btn" class="btn-main" onclick="handleButtonClick()">답 확인하기</button>
</div>

<script>
    // 오직 히라가나만 포함된 데이터 (사진 기반)
    const rawUnit1 = [
        {kr: "개", jp: "いぬ"}, {kr: "발/다리", jp: "あし"}, {kr: "손", jp: "て"},
        {kr: "생선", jp: "さかな"}, {kr: "초밥", jp: "すし"}, {kr: "고양이", jp: "ねこ"},
        {kr: "얼굴", jp: "かお"}, {kr: "책상", jp: "つくえ"}, {kr: "나/저(1인칭)", jp: "わたし"},
        {kr: "나(남성용)", jp: "ぼく"}, {kr: "나(남성/가벼운)", jp: "おれ"}, {kr: "나(격식)", jp: "わたくし"},
        {kr: "꽃", jp: "はな"}, {kr: "눈(Snow)", jp: "ゆき"}, {kr: "배(Ship)", jp: "ふね"},
        {kr: "벚꽃", jp: "さくら"}, {kr: "산", jp: "やま"}, {kr: "책", jp: "ほん"},
        {kr: "기모노", jp: "きもの"}, {kr: "가게", jp: "みせ"}, {kr: "1개", jp: "ひとつ"},
        {kr: "안경", jp: "めが네"}, {kr: "지도", jp: "ちず"}, {kr: "과일", jp: "くだもの"},
        {kr: "불꽃놀이", jp: "はなび"}, {kr: "연필", jp: "えんぴつ"}, {kr: "배고픔", jp: "ぺこぺこ"},
        {kr: "여기", jp: "ここ"}, {kr: "오후", jp: "ごご"}, {kr: "맛", jp: "あじ"},
        {kr: "반(Half)", jp: "はん"}, {kr: "밤", jp: "ばん"}, {kr: "100", jp: "ひゃく"},
        {kr: "가수", jp: "かしゅ"}, {kr: "식사", jp: "しょくじ"}, {kr: "학교", jp: "がっこう"},
        {kr: "잡지", jp: "ざっし"}, {kr: "3개", jp: "みっつ"}, {kr: "표/티켓", jp: "きっぷ"},
        {kr: "화재", jp: "かじ"}, {kr: "한자", jp: "かんじ"}, {kr: "튀김", jp: "てんぷら"},
        {kr: "한가운데", jp: "まんなか"}, {kr: "한국", jp: "かんこく"}, {kr: "우동", jp: "うどん"},
        {kr: "아줌마", jp: "おばさん"}, {kr: "할머니", jp: "おばあさん"}, {kr: "아저씨", jp: "おじさん"},
        {kr: "할아버지", jp: "おじいさん"}, {kr: "고등학교", jp: "こうこう"}
    ];

    const rawUnit2 = [
        {kr: "어머니", jp: "おかあさん"}, {kr: "형/오빠", jp: "おにいさん"}, {kr: "수학", jp: "すうがく"},
        {kr: "누나/언니", jp: "おねえさん"}, {kr: "영화", jp: "えいが"}, {kr: "많다", jp: "おおい"},
        {kr: "아버지", jp: "おとうさん"}, {kr: "숫자 0", jp: "ゼロ / れい"}, {kr: "숫자 1", jp: "いち"},
        {kr: "숫자 2", jp: "に"}, {kr: "숫자 3", jp: "さん"}, {kr: "숫자 4", jp: "よん / し"}, {kr: "숫자 5", jp: "ご"},
        {kr: "숫자 6", jp: "ろく"}, {kr: "숫자 7", jp: "なな / しち"}, {kr: "숫자 8", jp: "はち"}, {kr: "숫자 9", jp: "きゅう / く"},
        {kr: "숫자 10", jp: "じゅう"}, {kr: "전화번호", jp: "でんわばんごう"}, {kr: "몇 번입니까?", jp: "なんばん"},
        {kr: "의(연결)", jp: "の"}, {kr: "4시", jp: "よじ"}, {kr: "7시", jp: "しちじ"},
        {kr: "9시", jp: "くじ"}, {kr: "~분", jp: "ふん / ぷん"}, {kr: "10분", jp: "じゅっぷん"},
        {kr: "~부터 ~까지", jp: "から ～ まで"}, {kr: "오전", jp: "ごぜん"}
    ];

    const rawUnit3 = [
        {kr: "안녕(아침)", jp: "おはよう"}, {kr: "안녕(점심)", jp: "こんにちは"}, {kr: "안녕(저녁)", jp: "こんばんは"},
        {kr: "잘가(헤어질때)", jp: "さようなら"}, {kr: "내일 봐", jp: "また、あした"},
        {kr: "다녀올게요", jp: "いってきます"}, {kr: "다녀오세요", jp: "いってらっしゃい"},
        {kr: "다녀왔습니다", jp: "ただいま"}, {kr: "잘 다녀왔니", jp: "おかえり"},
        {kr: "고마워", jp: "ありがとう"}, {kr: "미안/죄송", jp: "ごめん / すみません"},
        {kr: "괜찮아요", jp: "かまいません"}, {kr: "모르겠습니다", jp: "わかりません"},
        {kr: "알겠습니다", jp: "わかりました"}, {kr: "천만에요", jp: "どういたしまして"},
        {kr: "여보세요", jp: "もしもし"}, {kr: "오랜만이야", jp: "ひさしぶり"},
        {kr: "처음 뵙겠습니다", jp: "はじめまして"}, {kr: "취미", jp: "しゅみ"},
        {kr: "요리", jp: "りょうり"}, {kr: "독서", jp: "どくしょ"}, {kr: "여행", jp: "りょこう"},
        {kr: "사진", jp: "しゃしん"}, {kr: "수영", jp: "すいえい"},
        {kr: "이쪽이야말로", jp: "こちらこそ"}, {kr: "진실은 하나!", jp: "しんじつはいつもひとつ！"}
    ];

    let currentUnitData = [];
    let unitIdx = 0;
    let wordIdx = 0;
    let isAnswerStep = false;

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function selectUnit(idx) {
        unitIdx = idx;
        wordIdx = 0;
        isAnswerStep = false;
        const rawData = [rawUnit1, rawUnit2, rawUnit3][idx];
        currentUnitData = shuffle([...rawData]);
        const btns = document.querySelectorAll('.unit-btn');
        btns.forEach((btn, i) => btn.classList.toggle('active', i === idx));
        render();
    }

    function render() {
        const word = currentUnitData[wordIdx];
        document.getElementById('unit-title').innerText = `사진 ${unitIdx + 1} 단어장 (히라가나 랜덤)`;
        document.getElementById('progress').innerText = `${wordIdx + 1} / ${currentUnitData.length}`;
        document.getElementById('korean-text').innerText = word.kr;
        document.getElementById('japanese-text').innerText = word.jp;
        const elJp = document.getElementById('japanese-text');
        const elBtn = document.getElementById('main-btn');
        if (isAnswerStep) {
            elJp.classList.remove('hidden');
            elBtn.innerText = "다음 단어로";
            elBtn.style.backgroundColor = "#2ecc71";
        } else {
            elJp.classList.add('hidden');
            elBtn.innerText = "답 확인하기";
            elBtn.style.backgroundColor = "#3498db";
        }
    }

    function handleButtonClick() {
        if (!isAnswerStep) {
            isAnswerStep = true;
        } else {
            isAnswerStep = false;
            wordIdx++;
            if (wordIdx >= currentUnitData.length) {
                alert(`해당 단계의 모든 단어를 완료했습니다! 다시 섞습니다.`);
                wordIdx = 0;
                shuffle(currentUnitData);
            }
        }
        render();
    }

    selectUnit(0);
</script>
</body>
</html>
