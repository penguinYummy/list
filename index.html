<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>일본어 단어 정복 프로그램</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 30px; background-color: #f0f2f5; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 450px; }
        .unit-info { color: #888; font-size: 0.9em; margin-bottom: 5px; }
        .progress { font-size: 0.8em; color: #3498db; margin-bottom: 20px; }
        .korean { font-size: 2.2em; font-weight: bold; margin-bottom: 30px; color: #2c3e50; min-height: 1.2em; }
        .japanese { font-size: 1.8em; color: #e74c3c; min-height: 1.5em; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        button { padding: 12px 25px; font-size: 1.1em; cursor: pointer; border: none; border-radius: 8px; transition: 0.3s; }
        .btn-main { background-color: #3498db; color: white; width: 100%; }
        .btn-main:hover { background-color: #2980b9; }
        .hidden { visibility: hidden; }
    </style>
</head>
<body>

<div class="container">
    <div id="unit-title" class="unit-info">단어장 로딩 중...</div>
    <div id="progress" class="progress">0 / 0</div>
    <div id="korean-text" class="korean">화면을 클릭하세요</div>
    <div id="japanese-text" class="japanese hidden">정답</div>
    <button id="main-btn" class="btn-main" onclick="handleButtonClick()">답 확인하기</button>
</div>

<script>
    // [사진 1, 2, 3 전체 데이터]
    const unit1 = [
        {kr: "개", jp: "犬(いぬ)"}, {kr: "발, 다리", jp: "足(あし)"}, {kr: "손", jp: "手(て)"},
        {kr: "생선", jp: "魚(さかな)"}, {kr: "초밥", jp: "寿司(すし)"}, {kr: "고양이", jp: "猫(ねこ)"},
        {kr: "얼굴", jp: "顔(かお)"}, {kr: "책상", jp: "机(つくえ)"}, {kr: "나, 저 (1인칭)", jp: "私(わたし)"},
        {kr: "나 (남성)", jp: "ぼく"}, {kr: "나 (남성, 가볍게)", jp: "おれ"}, {kr: "나 (격식)", jp: "わたくし"},
        {kr: "꽃", jp: "花(はな)"}, {kr: "눈(Snow)", jp: "雪(ゆき)"}, {kr: "배(Ship)", jp: "船(ふね)"},
        {kr: "벚꽃", jp: "桜(さくら)"}, {kr: "산", jp: "山(やま)"}, {kr: "책", jp: "本(ほん)"},
        {kr: "기모노", jp: "着物(きもの)"}, {kr: "가게, 상점", jp: "店(みせ)"}, {kr: "1개", jp: "ひとつ"},
        {kr: "안경", jp: "めがね"}, {kr: "지도", jp: "地図(ちず)"}, {kr: "과일", jp: "果物(くだもの)"},
        {kr: "불꽃놀이", jp: "花火(はなび)"}, {kr: "연필", jp: "鉛筆(えんぴつ)"}, {kr: "배고픈 모양(꼬르륵)", jp: "ぺこぺこ"},
        {kr: "여기, 이곳", jp: "ここ"}, {kr: "오후", jp: "午後(ごご)"}, {kr: "맛", jp: "味(あじ)"},
        {kr: "~반(Half)", jp: "半(はん)"}, {kr: "밤", jp: "晩(ばん)"}, {kr: "100", jp: "ひゃく"},
        {kr: "가수", jp: "歌手(かしゅ)"}, {kr: "식사", jp: "食事(しょくじ)"}, {kr: "학교", jp: "学校(がっこう)"},
        {kr: "잡지", jp: "雑誌(ざっし)"}, {kr: "3개", jp: "みっつ"}, {kr: "표, 티켓", jp: "切符(きっぷ)"},
        {kr: "화재", jp: "火事(かじ)"}, {kr: "한자", jp: "漢字(かんじ)"}, {kr: "튀김", jp: "てんぷら"},
        {kr: "한가운데", jp: "まんなか"}, {kr: "한국", jp: "韓国(かんこく)"}, {kr: "우동", jp: "うどん"},
        {kr: "아줌마, 이모", jp: "おばさん"}, {kr: "할머니", jp: "おばあさん"}, {kr: "아저씨, 삼촌", jp: "おじさん"},
        {kr: "할아버지", jp: "おじいさん"}, {kr: "고등학교", jp: "高校(こうこう)"}
    ];

    const unit2 = [
        {kr: "어머니", jp: "おかあさん"}, {kr: "형, 오빠", jp: "おにいさん"}, {kr: "수학", jp: "すうがく"},
        {kr: "누나, 언니", jp: "おねえさん"}, {kr: "영화", jp: "えいが"}, {kr: "많다", jp: "おおい"},
        {kr: "아버지", jp: "おとうさん"}, {kr: "숫자 0", jp: "ゼロ / れい / まる"}, {kr: "1", jp: "いち"},
        {kr: "2", jp: "に"}, {kr: "3", jp: "さん"}, {kr: "4", jp: "よん / し"}, {kr: "5", jp: "ご"},
        {kr: "6", jp: "ろく"}, {kr: "7", jp: "なな / しち"}, {kr: "8", jp: "はち"}, {kr: "9", jp: "きゅう / く"},
        {kr: "10", jp: "じゅう"}, {kr: "전화번호", jp: "電話番号(でんわばんごう)"}, {kr: "몇 번입니까?", jp: "何番(なんばん)ですか"},
        {kr: "전화번호의 '-' 표시", jp: "の"}, {kr: "4시", jp: "四時(よじ)"}, {kr: "7시", jp: "七時(しちじ)"},
        {kr: "9시", jp: "九時(くじ)"}, {kr: "~분", jp: "分(ふん/ぷん)"}, {kr: "10분", jp: "じゅっぷん"},
        {kr: "~부터 ~까지", jp: "～から ～まで"}, {kr: "오전", jp: "午前(ごぜん)"}
    ];

    const unit3 = [
        {kr: "안녕(아침)", jp: "おはよう"}, {kr: "안녕하세요(점심)", jp: "こんにちは"}, {kr: "안녕하세요(저녁)", jp: "こんばんは"},
        {kr: "잘 가(헤어질 때)", jp: "さよ(う)なら / じゃあ、ね"}, {kr: "내일 또 봐", jp: "また、あした"},
        {kr: "다녀오겠습니다", jp: "いってきます"}, {kr: "다녀오세요", jp: "いってらっしゃい"},
        {kr: "다녀왔습니다", jp: "ただいま"}, {kr: "잘 다녀오셨어요?", jp: "おかえり(なさい)"},
        {kr: "고마워", jp: "ありがとう"}, {kr: "미안합니다", jp: "ごめん(なさい) / すみません"},
        {kr: "괜찮아요", jp: "かまいませんよ"}, {kr: "모르겠습니다", jp: "わかりません"},
        {kr: "알았습니다", jp: "わかりました"}, {kr: "천만에요", jp: "どういたしまして"},
        {kr: "여보세요", jp: "もしもし"}, {kr: "오래간만이야", jp: "ひさしぶり"},
        {kr: "처음 뵙겠습니다", jp: "はじめまして"}, {kr: "취미", jp: "趣味(しゅみ)"},
        {kr: "요리", jp: "料理(りょうり)"}, {kr: "독서", jp: "読書(どくしょ)"}, {kr: "여행", jp: "旅行(りょこう)"},
        {kr: "이쪽이야말로", jp: "こちらこそ"}, {kr: "진실은 언제나 하나!", jp: "真実はいつもひとつ！"}
    ];

    const allUnits = [unit1, unit2, unit3];
    let unitIdx = 0;
    let wordIdx = 0;
    let isAnswerStep = false;

    const elUnit = document.getElementById('unit-title');
    const elProgress = document.getElementById('progress');
    const elKr = document.getElementById('korean-text');
    const elJp = document.getElementById('japanese-text');
    const elBtn = document.getElementById('main-btn');

    function render() {
        const currentUnit = allUnits[unitIdx];
        const word = currentUnit[wordIdx];

        elUnit.innerText = `단어장 ${unitIdx + 1}구역 (총 3구역)`;
        elProgress.innerText = `${wordIdx + 1} / ${currentUnit.length}`;
        elKr.innerText = word.kr;
        elJp.innerText = word.jp;

        if (isAnswerStep) {
            elJp.classList.remove('hidden');
            elBtn.innerText = "다음 단어로";
            elBtn.style.backgroundColor = "#2ecc71";
        } else {
            elJp.classList.add('hidden');
            elBtn.innerText = "답 확인하기";
            elBtn.style.backgroundColor = "#3498db";
        }
    }

    function handleButtonClick() {
        if (!isAnswerStep) {
            isAnswerStep = true;
        } else {
            isAnswerStep = false;
            wordIdx++;

            if (wordIdx >= allUnits[unitIdx].length) {
                wordIdx = 0;
                unitIdx++;
                if (unitIdx >= allUnits.length) {
                    alert("모든 사진의 단어를 끝냈습니다! 처음부터 다시 시작합니다.");
                    unitIdx = 0;
                } else {
                    alert(`다음 사진(단어장 ${unitIdx + 1})으로 넘어갑니다.`);
                }
            }
        }
        render();
    }

    render();
</script>
</body>
</html>
